# Production stack — run on EC2 after images are pushed to Docker Hub.
#
# Setup:
#   cp .env.production.example .env
#   # fill in secrets, set DOCKERHUB_USER
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  valkey:
    profiles: [local]
    image: valkey/valkey:latest
    container_name: notebot-valkey
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    command: valkey-server --appendonly yes
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  qdrant:
    profiles: [local]
    image: qdrant/qdrant:latest
    container_name: notebot-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    image: ${DOCKERHUB_USER}/notebot-lm-worker:${IMAGE_TAG:-latest}
    env_file: .env
    command: npx prisma migrate deploy
    restart: "no"

  app:
    image: ${DOCKERHUB_USER}/notebot-lm-app:${IMAGE_TAG:-latest}
    container_name: notebot-app
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      valkey:
        condition: service_healthy
        required: false
      qdrant:
        condition: service_healthy
        required: false
      migrate:
        condition: service_completed_successfully

  worker:
    image: ${DOCKERHUB_USER}/notebot-lm-worker:${IMAGE_TAG:-latest}
    container_name: notebot-worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      valkey:
        condition: service_healthy
        required: false
      qdrant:
        condition: service_healthy
        required: false
      migrate:
        condition: service_completed_successfully

volumes:
  valkey_data:
  qdrant_data:
