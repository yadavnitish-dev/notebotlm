# Host nginx config — install on EC2:
#   sudo cp deploy/nginx/notebotlm.conf /etc/nginx/sites-available/notebotlm
#   sudo ln -sf /etc/nginx/sites-available/notebotlm /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS (after DNS points to this server):
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d notebotlm.xyz

server {
    listen 80;
    server_name notebotlm.xyz;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
